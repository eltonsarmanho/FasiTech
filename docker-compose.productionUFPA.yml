# docker-compose.productionUFPA.yml
# Produção — VM UFPA (fasitech.cameta.ufpa.br / 172.16.28.198)
version: '3.8'

services:
  # BFF — FastAPI (Clean Architecture)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: fasitech-api-prod
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app
      - API_BASE_URL=http://172.16.28.198/api
      - ENVIRONMENT=production
      - RAG_DOCUMENTS_DIR=/app/resources
    env_file:
      - .env.production
    volumes:
      - ./credentials:/app/credentials:ro
      - ./config:/app/config:ro
      - ./resources:/app/resources:ro
      - ollama_data:/home/apiuser/.ollama
      - app_cache:/home/apiuser/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fasitech-network

  # Frontend React SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ''
    container_name: fasitech-frontend-prod
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fasitech-network

  # Nginx Proxy Reverso (sem SSL — a VM UFPA não usa Certbot)
  nginx:
    image: nginx:alpine
    container_name: fasitech-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.ufpa.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: always
    networks:
      - fasitech-network

networks:
  fasitech-network:
    driver: bridge

volumes:
  ollama_data:
  app_cache:
