# docker-compose.productionUFPA.yml
# Produção — VM UFPA (fasitech.cameta.ufpa.br / 172.16.28.198)
version: '3.8'

services:
  # BFF — FastAPI (Clean Architecture)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: fasitech-api-prod
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app
      - API_BASE_URL=https://fasitech.cameta.ufpa.br/api
      - ENVIRONMENT=production
      - RAG_DOCUMENTS_DIR=/app/resources
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env.production
    volumes:
      - ./credentials:/app/credentials:ro
      - ./config:/app/config:ro
      - ./resources:/app/resources:ro
      - app_cache:/home/apiuser/.cache
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fasitech-network

  # Frontend React SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ''
    container_name: fasitech-frontend-prod
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fasitech-network

  # Ollama — Embeddings locais (nomic-embed-text)
  ollama:
    image: ollama/ollama:latest
    container_name: fasitech-ollama-prod
    expose:
      - "11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s
    networks:
      - fasitech-network

  # Nginx Proxy Reverso com SSL Let's Encrypt
  nginx:
    image: nginx:alpine
    container_name: fasitech-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_UFPA_CONF:-./docker/nginx/nginx.ufpa.conf}:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    restart: always
    networks:
      - fasitech-network
      - proxy_network

networks:
  fasitech-network:
    driver: bridge
  proxy_network:
    external: true

volumes:
  ollama_models:
  app_cache:
