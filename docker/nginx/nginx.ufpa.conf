events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    upstream api_backend {
        server api:8000;
    }

    upstream frontend_backend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name fasitech.cameta.ufpa.br 172.16.28.198 200.239.109.52;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://fasitech.cameta.ufpa.br$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name fasitech.cameta.ufpa.br;

        ssl_certificate /etc/letsencrypt/live/fasitech.cameta.ufpa.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fasitech.cameta.ufpa.br/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location /api/ {
            proxy_pass http://api_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # --- SUBDOMÍNIO DO N8N — HTTP → HTTPS ---
    server {
        listen 80;
        server_name n8n.fasitech.cameta.ufpa.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://n8n.fasitech.cameta.ufpa.br$request_uri;
        }
    }

    # --- SUBDOMÍNIO DO N8N — HTTPS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name n8n.fasitech.cameta.ufpa.br;

        ssl_certificate /etc/letsencrypt/live/n8n.fasitech.cameta.ufpa.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/n8n.fasitech.cameta.ufpa.br/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://n8n_app:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Necessário para WebSockets (atualizações em tempo real)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- SUBDOMÍNIO DO CHATWOOT — HTTP → HTTPS ---
    server {
        listen 80;
        server_name chatwoot.fasitech.cameta.ufpa.br;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://chatwoot.fasitech.cameta.ufpa.br$request_uri;
        }
    }

    # --- SUBDOMÍNIO DO CHATWOOT — HTTPS ---
    server {
        listen 443 ssl;
        http2 on;
        server_name chatwoot.fasitech.cameta.ufpa.br;

        ssl_certificate /etc/letsencrypt/live/n8n.fasitech.cameta.ufpa.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/n8n.fasitech.cameta.ufpa.br/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://chatwoot:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Necessário para WebSockets (mensagens em tempo real)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
