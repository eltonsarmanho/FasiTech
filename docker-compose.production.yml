# docker-compose.production.yml
version: '3.8'

services:
  # BFF — FastAPI (Clean Architecture)
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    image: fasitech-bff:latest
    container_name: fasitech-api-prod
    expose:
      - "8000"
    environment:
      - PYTHONPATH=/app
      - API_BASE_URL=https://www.fasitech.com.br
      - RAG_DOCUMENTS_DIR=/app/resources
      - OLLAMA_HOST=http://172.18.0.1:11434
      - PERIODOS_LETIVOS=2026.1,2026.2,2026.3,2026.4,2027.1,2027.2,2027.3,2027.4,2028.1,2028.2,2028.3,2028.4
    env_file:
      - .env.production
    volumes:
      - ./credentials:/app/credentials:ro
      - ./config:/app/config:ro
      - ./resources:/app/resources:ro
      - ollama_data:/home/apiuser/.ollama
      - app_cache:/home/apiuser/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - fasitech-network

  # Frontend React SPA
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ''
    image: fasitech-spa:latest
    container_name: fasitech-frontend-prod
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fasitech-network

  # Nginx Proxy Reverso
  nginx:
    image: nginx:alpine
    container_name: fasitech-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - /home/ubuntu/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - fasitech-network

networks:
  fasitech-network:
    driver: bridge

volumes:
  ollama_data:
  app_cache:
